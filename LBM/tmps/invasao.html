<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lab+</title>
        <link rel="stylesheet" href="../static/css/index.css">
        <link rel="stylesheet" href="../static/css/bootstrap.min.css">
        <link rel="stylesheet" href="../static/css/tabela.css">
    </head>
    <body>
        <main class="d-flex flex-column flex-md-row">
            <div id="esquerda" class="d-flex flex-row flex-md-column">

                <div id="nav" class="d-flex flex-row flex-md-column">

                </div>
            </div>
            <div id="direita">
                <table>
                    <thead>
                        <tr>
                            <th>Horários de Invasões</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaHorarios"></tbody>
                </table>

        </main>

    <script src="../static/js/config.js"></script>
